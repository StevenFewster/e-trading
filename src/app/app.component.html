<!-- ============================================================
     AppComponent template — application shell
     ============================================================ -->

<!-- ── Top navigation bar ──────────────────────────────────── -->
<mat-toolbar class="app-toolbar">
  <mat-icon class="toolbar-icon">show_chart</mat-icon>
  <span class="toolbar-title">E-Trading Blotter</span>

  <span class="toolbar-divider"></span>

  <!-- Current time — updates via the Date pipe -->
  <span class="toolbar-clock">{{ now | date:'EEE dd MMM yyyy  HH:mm:ss' }}</span>
</mat-toolbar>

<!-- ── Main content — just the blotter; ticket is a dialog overlay ── -->
<main class="app-main">
  <app-blotter></app-blotter>
</main>
